opencollection: "1.0.0"
info:
  name: Forgot Password Workflow
  version: "1.0.0"
bundled: true
config:
  environments:
    - name: local
      variables:
        - name: baseUrl
          value: http://localhost:8080
          enabled: true
items:
  - name: Forgot Password Request
    type: http
    info:
      name: Forgot Password Request
      seq: 1
    http:
      method: POST
      url: "{{baseUrl}}/api/auth/forgot-password"
      body:
        type: json
        data: |-
          {
            "username": "admin"
          }
      auth: none
  - name: Reset Password
    type: http
    info:
      name: Reset Password
      seq: 2
    http:
      method: POST
      url: "{{baseUrl}}/api/auth/reset-password"
      body:
        type: json
        data: |-
          {
            "token": "REPLACE_WITH_TOKEN_FROM_LOGS",
            "newPassword": "NewSecurePassword123!"
          }
      auth: none
