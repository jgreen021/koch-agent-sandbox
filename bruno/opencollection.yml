opencollection: "1.0.0"
info:
  name: "Antigravity REST API Security"
  version: "1.0.0"
bundled: true
config:
  environments:
    - name: local
      variables:
        - name: baseUrl
          value: http://localhost:8080
          enabled: true
        - name: accessToken
          value: ""
          enabled: true
        - name: refreshToken
          value: ""
          enabled: true
items:
  - name: Login
    type: http
    info:
      name: Login
      seq: 1
    http:
      method: POST
      url: "{{baseUrl}}/api/auth/login"
      body:
        type: json
        data: |-
          {
            "username": "admin",
            "password": "admin"
          }
      auth: none
    runtime:
      scripts:
        - type: after-response
          code: |-
            if (res.status === 200) {
              bru.setEnvVar("accessToken", res.body.accessToken);
              bru.setEnvVar("refreshToken", res.body.refreshToken);
            }
  - name: Refresh Token
    type: http
    info:
      name: Refresh Token
      seq: 2
    http:
      method: POST
      url: "{{baseUrl}}/api/auth/refresh"
      body:
        type: json
        data: |-
          {
            "refreshToken": "{{refreshToken}}"
          }
      auth: none
  - name: Post Reading
    type: http
    info:
      name: Post Reading
      seq: 3
    http:
      method: POST
      url: "{{baseUrl}}/api/sensors/readings"
      body:
        type: json
        data: |-
          {
            "assetId": "sensor-1",
            "status": "OK",
            "readingValue": 25.5,
            "sensorType": "TEMPERATURE",
            "timestamp": "2026-03-25T21:00:00Z"
          }
      auth:
        type: bearer
        token: "{{accessToken}}"
  - name: Get Readings
    type: http
    info:
      name: Get Readings
      seq: 4
    http:
      method: GET
      url: "{{baseUrl}}/api/sensors/readings"
      params:
        - name: assetId
          value: sensor-1
          type: query
      auth:
        type: bearer
        token: "{{accessToken}}"
docs: |-
  # Sensor API Documentation
  These endpoints are secured by an RSA-signed JWT. 
  You must first obtain a token via the `/api/auth/login` or refresh it via `/api/auth/refresh`.
