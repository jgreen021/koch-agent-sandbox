opencollection: "1.0.0"
info:
  name: Kilns CRUD API Collection
  version: "1.0.0"
bundled: true
config:
  environments:
    - name: local
      variables:
        - name: baseUrl
          value: http://localhost:8080
          enabled: true
        - name: gateway-admin-token
          value: ""
          enabled: true
items:
  - name: Create Kiln
    type: http
    info:
      name: Create Kiln
      seq: 1
    http:
      method: POST
      url: "{{baseUrl}}/api/kilns"
      headers:
        - name: Content-Type
          value: application/json
          disabled: false
      body:
        type: json
        data: |-
          {
            "name": "Industrial Test Kiln",
            "type": "CONTINUOUS",
            "isActive": true,
            "baselineTemp": 500.0,
            "warningTemp": 600.0,
            "criticalTemp": 700.0,
            "stateDurationSeconds": 60,
            "warningProbability": 0.15,
            "criticalProbability": 0.05
          }
      auth:
        type: bearer
        token: "{{gateway-admin-token}}"

  - name: Get All Kilns
    type: http
    info:
      name: Get All Kilns
      seq: 2
    http:
      method: GET
      url: "{{baseUrl}}/api/kilns"
      auth: none

  - name: Update Kiln
    type: http
    info:
      name: Update Kiln
      seq: 3
    http:
      method: PUT
      url: "{{baseUrl}}/api/kilns/{{kiln-id}}"
      headers:
        - name: Content-Type
          value: application/json
          disabled: false
      body:
        type: json
        data: |-
          {
            "name": "Updated Kiln",
            "type": "ELECTRIC",
            "isActive": false,
            "baselineTemp": 250.0,
            "warningTemp": 300.0,
            "criticalTemp": 350.0,
            "stateDurationSeconds": 15,
            "warningProbability": 0.20,
            "criticalProbability": 0.10
          }
      auth:
        type: bearer
        token: "{{gateway-admin-token}}"

  - name: Delete Kiln
    type: http
    info:
      name: Delete Kiln
      seq: 4
    http:
      method: DELETE
      url: "{{baseUrl}}/api/kilns/{{kiln-id}}"
      auth:
        type: bearer
        token: "{{gateway-admin-token}}"
