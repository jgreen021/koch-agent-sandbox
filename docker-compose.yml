services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: local-edge-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: local-oracledb
    restart: unless-stopped
    environment:
      # Sets password for SYS, SYSTEM, and PDBADMIN (equivalent to 'sa')
      - ORACLE_PWD=${ORACLE_PWD}
      # Optional: Explicitly name your PDB (equivalent to MSSQL DB name)
      - ORACLE_DATABASE=mcp_learning_1
    ports:
      - "1521:1521" # Oracle default listener port
    volumes:
      # Data persistence mount point for Oracle
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      # Checks if the database is open and ready for connections
      test: [ "CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -L system/${ORACLE_PWD}@//localhost:1521/FREEPDB1" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 5s
  vault:
    image: hashicorp/vault:latest
    container_name: vault-prod-sim
    ports:
      - "8200:8200"
    volumes:
      - ./vault/config:/vault/config
      - ./vault/data:/vault/file
    cap_add:
      - IPC_LOCK
    # CHANGE THIS: Remove the -config= flag
    command: server
    restart: always

volumes:
  oracle_data:
