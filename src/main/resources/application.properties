# Spring Boot Database Configuration for Azure SQL
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=mcp_learning_1;encrypt=true;trustServerCertificate=true;
spring.datasource.username=mcp_agent_user
spring.datasource.password=REDACTED_DB_PASSWORD
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# Web Server Configuration
server.port=8080
