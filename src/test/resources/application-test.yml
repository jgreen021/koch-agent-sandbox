spring:
  application:
    name: koch-anomaly-test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=Oracle;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  cloud:
    vault:
      enabled: false  # Disable Vault for unit/integration tests to avoid connection errors
  # Provide a static key for tests since Vault is disabled
reading-value-key: REDACTED_READING_KEY=
