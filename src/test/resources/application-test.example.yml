logging:
  level:
    org.springframework.security: DEBUG
spring:
  application:
    name: koch-anomaly-test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=Oracle;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  cloud:
    vault:
      enabled: false  # Disable Vault for unit/integration tests to avoid connection errors
# Provide a static key for tests since Vault is disabled
# WARNING: This is a placeholder for testing only. Do not use production keys in test files.
# For local tests, copy this file to application-test.yml and replace the key below if needed.
reading-value-key: dGhpcy1pcy1hLWZha2Uta2V5LTMyLWJ5dGVzLWxvbmctISEhIQ==
